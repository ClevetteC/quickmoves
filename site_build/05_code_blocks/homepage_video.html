<!-- Code Block: Homepage hero video -->
<!-- Destination: Homepage — hero section, replacing the crew/truck photo placeholder -->
<!-- Video source: Squarespace Asset Library (HLS stream) -->

<div class="qm-video-section">
  <video
    id="qm-hero-video"
    muted
    loop
    playsinline
    autoplay
    style="width:100%; height:100%; object-fit:cover; border-radius:6px; display:block;"
    aria-label="Quick Move and Packing crew at work"
  ></video>
  <p class="qm-video-caption">Your crew. Your move. Done right.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  var video = document.getElementById('qm-hero-video');
  var src = 'https://video.squarespace-cdn.com/content/v1/6426fe42f795c213aded7367/1b85521b-1f90-4ed4-ac06-784c001f6c8b/playlist.m3u8';

  if (Hls.isSupported()) {
    var hls = new Hls({ autoStartLoad: true });
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari / iOS — native HLS
    video.src = src;
    video.play();
  }
})();
</script>
